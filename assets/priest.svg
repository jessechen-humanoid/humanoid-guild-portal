<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="48" height="48" fill="#1a1a1a" shape-rendering="crispEdges">
  <!-- Hat/Hood -->
  <rect x="5" y="0" width="6" height="1"/>
  <rect x="4" y="1" width="8" height="1"/>
  <!-- Cross on hat -->
  <rect x="7" y="1" width="2" height="1"/>
  <!-- Head -->
  <rect x="5" y="2" width="6" height="1"/>
  <rect x="5" y="3" width="6" height="1"/>
  <!-- Eyes -->
  <rect x="6" y="3" width="1" height="1" fill="#fafaf8"/>
  <rect x="9" y="3" width="1" height="1" fill="#fafaf8"/>
  <!-- Body/Robe -->
  <rect x="4" y="4" width="8" height="1"/>
  <rect x="3" y="5" width="10" height="1"/>
  <rect x="3" y="6" width="10" height="1"/>
  <!-- Cross on robe -->
  <rect x="7" y="5" width="2" height="1" fill="#fafaf8"/>
  <!-- Arms with staff -->
  <rect x="2" y="6" width="1" height="3"/>
  <rect x="13" y="5" width="1" height="4"/>
  <rect x="13" y="4" width="1" height="1"/>
  <rect x="12" y="3" width="3" height="1"/>
  <rect x="13" y="2" width="1" height="1"/>
  <!-- Lower robe -->
  <rect x="4" y="7" width="8" height="1"/>
  <rect x="4" y="8" width="8" height="1"/>
  <rect x="4" y="9" width="8" height="1"/>
  <rect x="5" y="10" width="6" height="1"/>
  <!-- Robe bottom detail -->
  <rect x="5" y="10" width="2" height="1"/>
  <rect x="9" y="10" width="2" height="1"/>
  <!-- Feet -->
  <rect x="5" y="11" width="2" height="1"/>
  <rect x="9" y="11" width="2" height="1"/>
</svg>
