<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="48" height="48" fill="#1a1a1a" shape-rendering="crispEdges">
  <!-- Helmet -->
  <rect x="6" y="0" width="4" height="1"/>
  <rect x="5" y="1" width="6" height="1"/>
  <rect x="7" y="0" width="2" height="1"/>
  <!-- Helmet visor -->
  <rect x="5" y="2" width="6" height="1"/>
  <!-- Head/Face -->
  <rect x="5" y="3" width="6" height="1"/>
  <!-- Eyes -->
  <rect x="6" y="3" width="1" height="1" fill="#fafaf8"/>
  <rect x="9" y="3" width="1" height="1" fill="#fafaf8"/>
  <!-- Neck -->
  <rect x="6" y="4" width="4" height="1"/>
  <!-- Shoulders/Armor -->
  <rect x="3" y="5" width="10" height="1"/>
  <rect x="2" y="6" width="12" height="1"/>
  <!-- Shoulder pads -->
  <rect x="2" y="5" width="1" height="2"/>
  <rect x="13" y="5" width="1" height="2"/>
  <!-- Body armor -->
  <rect x="4" y="7" width="8" height="1"/>
  <rect x="4" y="8" width="8" height="1"/>
  <!-- Belt -->
  <rect x="4" y="9" width="8" height="1"/>
  <rect x="7" y="9" width="2" height="1" fill="#fafaf8"/>
  <!-- Sword (right side) -->
  <rect x="14" y="3" width="1" height="1"/>
  <rect x="14" y="4" width="1" height="1"/>
  <rect x="14" y="5" width="1" height="1"/>
  <rect x="14" y="6" width="1" height="1"/>
  <rect x="13" y="7" width="1" height="1"/>
  <rect x="14" y="7" width="1" height="1"/>
  <rect x="15" y="7" width="1" height="1"/>
  <rect x="14" y="8" width="1" height="3"/>
  <!-- Shield (left side) -->
  <rect x="0" y="5" width="2" height="1"/>
  <rect x="0" y="6" width="3" height="1"/>
  <rect x="0" y="7" width="3" height="1"/>
  <rect x="0" y="8" width="2" height="1"/>
  <rect x="1" y="7" width="1" height="1" fill="#fafaf8"/>
  <!-- Legs -->
  <rect x="5" y="10" width="3" height="1"/>
  <rect x="8" y="10" width="3" height="1"/>
  <rect x="5" y="11" width="2" height="1"/>
  <rect x="9" y="11" width="2" height="1"/>
  <!-- Boots -->
  <rect x="4" y="12" width="3" height="1"/>
  <rect x="9" y="12" width="3" height="1"/>
</svg>
