<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="48" height="48" fill="#1a1a1a" shape-rendering="crispEdges">
  <!-- Pointed hat top -->
  <rect x="7" y="0" width="2" height="1"/>
  <rect x="6" y="1" width="4" height="1"/>
  <rect x="5" y="2" width="6" height="1"/>
  <rect x="4" y="3" width="8" height="1"/>
  <!-- Hat brim -->
  <rect x="3" y="4" width="10" height="1"/>
  <!-- Head -->
  <rect x="5" y="5" width="6" height="1"/>
  <rect x="5" y="6" width="6" height="1"/>
  <!-- Eyes -->
  <rect x="6" y="6" width="1" height="1" fill="#fafaf8"/>
  <rect x="9" y="6" width="1" height="1" fill="#fafaf8"/>
  <!-- Body/Robe -->
  <rect x="5" y="7" width="6" height="1"/>
  <rect x="4" y="8" width="8" height="1"/>
  <rect x="4" y="9" width="8" height="1"/>
  <!-- Arms -->
  <rect x="3" y="8" width="1" height="2"/>
  <rect x="12" y="8" width="1" height="2"/>
  <!-- Staff/Wand with sparkle -->
  <rect x="1" y="6" width="1" height="1"/>
  <rect x="2" y="7" width="1" height="1"/>
  <rect x="3" y="7" width="1" height="1"/>
  <rect x="0" y="5" width="1" height="1"/>
  <rect x="2" y="5" width="1" height="1"/>
  <rect x="1" y="4" width="1" height="1"/>
  <!-- Lower robe -->
  <rect x="4" y="10" width="8" height="1"/>
  <rect x="5" y="11" width="6" height="1"/>
  <!-- Robe hem -->
  <rect x="5" y="12" width="2" height="1"/>
  <rect x="9" y="12" width="2" height="1"/>
  <!-- Feet -->
  <rect x="5" y="13" width="2" height="1"/>
  <rect x="9" y="13" width="2" height="1"/>
</svg>
