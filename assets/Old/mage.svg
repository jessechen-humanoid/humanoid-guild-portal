<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="48" height="48" fill="#1a1a1a" shape-rendering="crispEdges">
  <!-- Pointed wizard hat -->
  <rect x="15" y="0" width="2" height="1"/>
  <rect x="14" y="1" width="4" height="1"/>
  <rect x="13" y="2" width="6" height="1"/>
  <rect x="13" y="3" width="6" height="1"/>
  <rect x="12" y="4" width="8" height="1"/>
  <rect x="12" y="5" width="8" height="1"/>
  <!-- Star on hat (white) -->
  <rect x="15" y="3" width="2" height="1" fill="#fafaf8"/>
  <rect x="14" y="4" width="4" height="1" fill="#fafaf8"/>
  <rect x="15" y="5" width="2" height="1" fill="#fafaf8"/>
  <!-- Hat brim -->
  <rect x="8" y="6" width="16" height="1"/>
  <rect x="7" y="7" width="18" height="1"/>
  <!-- Head/face -->
  <rect x="7" y="8" width="18" height="1"/>
  <rect x="7" y="9" width="18" height="1"/>
  <rect x="7" y="10" width="18" height="1"/>
  <rect x="7" y="11" width="18" height="1"/>
  <rect x="7" y="12" width="18" height="1"/>
  <rect x="8" y="13" width="16" height="1"/>
  <rect x="9" y="14" width="14" height="1"/>
  <rect x="10" y="15" width="12" height="1"/>
