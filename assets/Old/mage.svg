  <rect x="10" y="10" width="3" height="2" fill="#fafaf8"/>
  <rect x="19" y="10" width="3" height="2" fill="#fafaf8"/>
  <!-- Body/robe -->
  <rect x="11" y="16" width="10" height="1"/>
  <rect x="11" y="17" width="10" height="1"/>
  <rect x="11" y="18" width="10" height="1"/>
  <rect x="10" y="19" width="12" height="1"/>
  <rect x="10" y="20" width="12" height="1"/>
  <rect x="10" y="21" width="12" height="1"/>
  <rect x="9" y="22" width="14" height="1"/>
  <rect x="9" y="23" width="14" height="1"/>
  <rect x="8" y="24" width="16" height="1"/>
  <rect x="8" y="25" width="16" height="1"/>
  <!-- Belt (white accent) -->
  <rect x="12" y="19" width="8" height="1" fill="#fafaf8"/>
  <!-- Arms -->
  <rect x="8" y="18" width="3" height="1"/>
  <rect x="7" y="19" width="3" height="1"/>
  <rect x="7" y="20" width="3" height="1"/>
  <rect x="21" y="18" width="3" height="1"/>
  <rect x="22" y="19" width="3" height="1"/>
  <rect x="22" y="20" width="3" height="1"/>
  <!-- Magic staff (left hand) -->
  <rect x="5" y="8" width="2" height="1"/>
  <rect x="5" y="9" width="2" height="1"/>
  <rect x="5" y="10" width="2" height="1"/>
  <rect x="5" y="11" width="2" height="1"/>
  <rect x="5" y="12" width="2" height="1"/>
  <rect x="5" y="13" width="2" height="1"/>
  <rect x="5" y="14" width="2" height="1"/>
  <rect x="5" y="15" width="2" height="1"/>
  <rect x="5" y="16" width="2" height="1"/>
  <rect x="5" y="17" width="2" height="1"/>
  <rect x="5" y="18" width="2" height="1"/>
  <rect x="5" y="19" width="2" height="1"/>
  <rect x="5" y="20" width="2" height="1"/>
  <!-- Star/sparkle on staff top (white) -->
  <rect x="5" y="6" width="2" height="1" fill="#fafaf8"/>
  <rect x="4" y="7" width="4" height="1" fill="#fafaf8"/>
  <rect x="5" y="8" width="2" height="1" fill="#fafaf8"/>
  <!-- Legs -->
  <rect x="11" y="26" width="4" height="1"/>
  <rect x="17" y="26" width="4" height="1"/>
  <rect x="11" y="27" width="4" height="1"/>
  <rect x="17" y="27" width="4" height="1"/>
  <!-- Feet -->
  <rect x="10" y="28" width="5" height="1"/>
  <rect x="17" y="28" width="5" height="1"/>
