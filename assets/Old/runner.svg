<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 16" width="30" height="24" fill="#1a1a1a" shape-rendering="crispEdges">
  <!-- Big head -->
  <rect x="7" y="0" width="6" height="1"/>
  <rect x="6" y="1" width="8" height="1"/>
  <rect x="5" y="2" width="10" height="1"/>
  <rect x="5" y="3" width="10" height="1"/>
  <rect x="5" y="4" width="10" height="1"/>
  <rect x="5" y="5" width="10" height="1"/>
  <rect x="6" y="6" width="8" height="1"/>
  <rect x="7" y="7" width="6" height="1"/>
  <!-- Eyes (white rectangles) -->
  <rect x="7" y="4" width="2" height="1" fill="#fafaf8"/>
  <rect x="11" y="4" width="2" height="1" fill="#fafaf8"/>
  <!-- Body -->
  <rect x="8" y="8" width="4" height="1"/>
  <rect x="8" y="9" width="4" height="1"/>
  <rect x="8" y="10" width="4" height="1"/>
  <!-- Arm forward (left) -->
  <rect x="5" y="8" width="3" height="1"/>
  <rect x="4" y="9" width="2" height="1"/>
  <!-- Arm back (right) -->
  <rect x="12" y="9" width="3" height="1"/>
  <rect x="14" y="10" width="2" height="1"/>
  <!-- Leg forward (left) -->
  <rect x="6" y="11" width="3" height="1"/>
  <rect x="5" y="12" width="2" height="1"/>
  <rect x="4" y="13" width="2" height="1"/>
  <!-- Leg back (right) -->
  <rect x="11" y="11" width="3" height="1"/>
  <rect x="13" y="12" width="2" height="1"/>
  <rect x="14" y="13" width="2" height="1"/>
  <!-- Foot forward -->
  <rect x="3" y="14" width="3" height="1"/>
  <!-- Foot back -->
  <rect x="14" y="14" width="3" height="1"/>
</svg>