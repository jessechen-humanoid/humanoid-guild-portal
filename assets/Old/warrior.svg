<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="48" height="48" fill="#1a1a1a" shape-rendering="crispEdges">
  <!-- Helmet crest/plume -->
  <rect x="14" y="0" width="4" height="1"/>
  <rect x="14" y="1" width="4" height="1"/>
  <rect x="14" y="2" width="4" height="1"/>
  <!-- Helmet crest highlight (white) -->
  <rect x="15" y="0" width="2" height="1" fill="#fafaf8"/>
  <rect x="15" y="1" width="2" height="1" fill="#fafaf8"/>
  <!-- Helmet base -->
  <rect x="9" y="3" width="14" height="1"/>
  <rect x="8" y="4" width="16" height="1"/>
  <rect x="7" y="5" width="18" height="1"/>
  <!-- Head/face -->
  <rect x="7" y="6" width="18" height="1"/>
  <rect x="7" y="7" width="18" height="1"/>
  <rect x="7" y="8" width="18" height="1"/>
  <rect x="7" y="9" width="18" height="1"/>
  <rect x="7" y="10" width="18" height="1"/>
  <rect x="7" y="11" width="18" height="1"/>
  <rect x="8" y="12" width="16" height="1"/>
  <rect x="9" y="13" width="14" height="1"/>
  <rect x="10" y="14" width="12" height="1"/>
  <!-- Eyes (white rectangles) -->
  <rect x="10" y="9" width="3" height="2" fill="#fafaf8"/>
  <rect x="19" y="9" width="3" height="2" fill="#fafaf8"/>
  <!-- Armor body -->
  <rect x="11" y="15" width="10" height="1"/>
  <rect x="11" y="16" width="10" height="1"/>
  <rect x="11" y="17" width="10" height="1"/>
  <rect x="11" y="18" width="10" height="1"/>
  <rect x="11" y="19" width="10" height="1"/>
  <rect x="10" y="20" width="12" height="1"/>
  <rect x="10" y="21" width="12" height="1"/>
  <rect x="10" y="22" width="12" height="1"/>
  <rect x="10" y="23" width="12" height="1"/>
  <rect x="10" y="24" width="12" height="1"/>
  <!-- Belt (white accent) -->
  <rect x="12" y="21" width="8" height="1" fill="#fafaf8"/>
  <!-- Arms -->
  <rect x="8" y="17" width="3" height="1"/>
  <rect x="7" y="18" width="3" height="1"/>
  <rect x="7" y="19" width="3" height="1"/>
  <rect x="21" y="17" width="3" height="1"/>
  <rect x="22" y="18" width="3" height="1"/>
  <rect x="22" y="19" width="3" height="1"/>
  <!-- Sword (right side, blade up) -->
  <rect x="26" y="5" width="2" height="1"/>
  <rect x="26" y="6" width="2" height="1"/>
  <rect x="26" y="7" width="2" height="1"/>
  <rect x="26" y="8" width="2" height="1"/>
  <rect x="26" y="9" width="2" height="1"/>
  <rect x="26" y="10" width="2" height="1"/>
  <rect x="26" y="11" width="2" height="1"/>
  <rect x="26" y="12" width="2" height="1"/>
  <rect x="26" y="13" width="2" height="1"/>
  <!-- Sword guard -->
  <rect x="25" y="14" width="4" height="1"/>
  <!-- Sword handle -->
  <rect x="26" y="15" width="2" height="1"/>
  <rect x="26" y="16" width="2" height="1"/>
  <rect x="26" y="17" width="2" height="1"/>
  <rect x="26" y="18" width="2" height="1"/>
  <!-- Shield (left side) -->
  <rect x="2" y="13" width="5" height="1"/>
  <rect x="1" y="14" width="6" height="1"/>
  <rect x="1" y="15" width="6" height="1"/>
  <rect x="1" y="16" width="6" height="1"/>
  <rect x="1" y="17" width="6" height="1"/>
  <rect x="1" y="18" width="6" height="1"/>
  <rect x="2" y="19" width="5" height="1"/>
  <rect x="3" y="20" width="3" height="1"/>
  <!-- Shield highlight (white) -->
  <rect x="3" y="15" width="2" height="2" fill="#fafaf8"/>
  <!-- Legs -->
  <rect x="11" y="25" width="4" height="1"/>
  <rect x="17" y="25" width="4" height="1"/>
  <rect x="11" y="26" width="4" height="1"/>
  <rect x="17" y="26" width="4" height="1"/>
  <!-- Feet -->
  <rect x="10" y="27" width="5" height="1"/>
  <rect x="17" y="27" width="5" height="1"/>
