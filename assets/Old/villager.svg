  <!-- Right arm going up -->
  <rect x="25" y="3" width="2" height="1"/>
  <rect x="26" y="4" width="2" height="1"/>
  <rect x="26" y="5" width="2" height="1"/>
  <rect x="25" y="6" width="2" height="1"/>
  <rect x="25" y="7" width="2" height="1"/>
  <rect x="24" y="8" width="2" height="1"/>
