<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="32" height="32" fill="#1a1a1a" shape-rendering="crispEdges">
  <!-- Helmet -->
  <rect x="6" y="0" width="4" height="1"/>
  <rect x="5" y="1" width="6" height="1"/>
  <!-- Helmet visor -->
  <rect x="5" y="2" width="6" height="1"/>
  <!-- Head/Face -->
  <rect x="5" y="3" width="6" height="1"/>
  <!-- Eyes -->
  <rect x="6" y="3" width="1" height="1" fill="#fafaf8"/>
  <rect x="9" y="3" width="1" height="1" fill="#fafaf8"/>
  <!-- Neck -->
  <rect x="6" y="4" width="4" height="1"/>
  <!-- Shoulders -->
  <rect x="4" y="5" width="8" height="1"/>
  <!-- Body -->
  <rect x="5" y="6" width="6" height="1"/>
  <rect x="5" y="7" width="6" height="1"/>
  <rect x="5" y="8" width="6" height="1"/>
  <!-- Belt -->
  <rect x="5" y="9" width="6" height="1"/>
  <rect x="7" y="9" width="2" height="1" fill="#fafaf8"/>
  <!-- Sword (on back, angled) -->
  <rect x="11" y="3" width="1" height="1"/>
  <rect x="12" y="4" width="1" height="1"/>
  <rect x="12" y="5" width="1" height="1"/>
  <rect x="12" y="6" width="1" height="1"/>
  <!-- Running legs - stride pose -->
  <!-- Front leg (extended forward) -->
  <rect x="8" y="10" width="2" height="1"/>
  <rect x="9" y="11" width="2" height="1"/>
  <rect x="10" y="12" width="3" height="1"/>
  <!-- Back leg (extended backward) -->
  <rect x="5" y="10" width="2" height="1"/>
  <rect x="4" y="11" width="2" height="1"/>
  <rect x="2" y="12" width="3" height="1"/>
  <!-- Cape flowing back -->
  <rect x="3" y="5" width="1" height="1"/>
  <rect x="2" y="6" width="2" height="1"/>
  <rect x="1" y="7" width="2" height="1"/>
</svg>
